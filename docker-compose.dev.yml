services:
  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/data
    environment:
      - DATA_DIR=/data
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - APP_URL=${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM=${RESEND_FROM:-}
    networks:
      - pos-network

  frontend:
    image: oven/bun:1-alpine
    working_dir: /app
    command: sh -c "bun install && bun run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NUXT_PUBLIC_API_URL=http://localhost:3001
      - NUXT_PUBLIC_APP_URL=${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NUXT_PUBLIC_LOG_LEVEL=${NUXT_PUBLIC_LOG_LEVEL:-debug}
    depends_on:
      - backend
    networks:
      - pos-network

  db-admin:
    profiles: ["admin"]
    image: javimosch/adminer-node:latest
    ports:
      - "8080:8080"
    environment:
      ADMINER_HOST: 0.0.0.0
      ADMINER_PORT: 8080
      ADMINER_NO_OPEN: "1"
      ADMINER_BASIC_USER: ${DB_ADMIN_USER:-admin}
      ADMINER_BASIC_PASS: ${DB_ADMIN_PASS:-changeme}
      ADMINER_CONNECTIONS: |
        [{"label":"zKCNT POS","driver":"sqlite","server":"/data/pos.db","username":"","password":"","db":""}]
    volumes:
      - ./backend/data:/data:ro
    depends_on:
      - backend
    networks:
      - pos-network

volumes:
  frontend_node_modules:

networks:
  pos-network:
    driver: bridge
