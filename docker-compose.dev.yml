services:
  pocketbase:
    build:
      context: ./backend
      args:
        PB_VERSION: "0.38.1"
    ports:
      - "8090:8090"
    volumes:
      - ./backend/pb_data:/pb/pb_data
      - ./backend/pb_migrations:/pb/pb_migrations
      - ./backend/pb_hooks:/pb/pb_hooks
    environment:
      - APP_URL=${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
    networks:
      - pos-network

  frontend:
    image: oven/bun:1-alpine
    working_dir: /app
    command: sh -c "bun install && bun run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NUXT_PUBLIC_POCKETBASE_URL=http://localhost:8090
      - NUXT_PUBLIC_APP_URL=${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      - pocketbase
    networks:
      - pos-network

volumes:
  frontend_node_modules:

networks:
  pos-network:
    driver: bridge
