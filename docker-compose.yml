services:
  backend:
    build:
      context: ./backend
    volumes:
      - backend_data:/data
    environment:
      - DATA_DIR=/data
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - APP_URL=${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
    networks:
      - pos-network

  frontend:
    build:
      context: ./frontend
      args:
        NUXT_PUBLIC_API_URL: ${NUXT_PUBLIC_API_URL:-http://localhost:3001}
        NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
    environment:
      - NUXT_PUBLIC_API_URL=${NUXT_PUBLIC_API_URL:-http://localhost:3001}
      - NUXT_PUBLIC_APP_URL=${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      - backend
    networks:
      - pos-network

volumes:
  backend_data:

networks:
  pos-network:
    driver: bridge
