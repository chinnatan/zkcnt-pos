services:
  pocketbase:
    build:
      context: ./backend
      args:
        PB_VERSION: "0.38.1"
    volumes:
      - pb_data:/pb/pb_data
    networks:
      - pos-network

  frontend:
    build:
      context: ./frontend
    environment:
      - NUXT_PUBLIC_POCKETBASE_URL=${POCKETBASE_URL:-http://pocketbase:8090}
    depends_on:
      - pocketbase
    networks:
      - pos-network

volumes:
  pb_data:

networks:
  pos-network:
    driver: bridge
