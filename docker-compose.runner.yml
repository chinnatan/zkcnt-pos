# GitHub Actions self-hosted runner for Pi 5 deploy.
#
# DEPLOY_DIR must be the git repo root (contains docker-compose.prod.yml AND .env).
# Example for this project on Pi:
#
#   cd ~/Desktop/zkcnt-pos
#   cp .env.example .env   # edit POCKETBASE_URL
#   DEPLOY_DIR=$PWD RUNNER_TOKEN=<token> docker compose -f docker-compose.runner.yml up -d
#
# Do NOT put .env in a subdirectory — the workflow expects /deploy/.env inside the container.

services:
  github-runner:
    image: myoung34/github-runner:latest
    restart: unless-stopped
    environment:
      REPO_URL: ${REPO_URL:-https://github.com/chinnatan/zkcnt-pos}
      RUNNER_TOKEN: ${RUNNER_TOKEN}
      RUNNER_NAME: ${RUNNER_NAME:-pi5-runner}
      RUNNER_LABELS: pi5,linux,ARM64
      RUNNER_WORKDIR: /deploy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DEPLOY_DIR:?Set DEPLOY_DIR to the repo root on the Pi}:/deploy
      - runner-data:/runner

volumes:
  runner-data:
