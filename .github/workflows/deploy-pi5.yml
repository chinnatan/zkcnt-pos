name: Deploy to Pi 5

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pi5
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, pi5]

    steps:
      - name: Verify deploy directory
        run: |
          if [ ! -d /deploy ]; then
            echo "::error::Deploy directory /deploy not found."
            echo "Set DEPLOY_DIR to your repo root when starting the runner, e.g.:"
            echo "  DEPLOY_DIR=/home/zkcnt/Desktop/zkcnt-pos docker compose -f docker-compose.runner.yml up -d"
            exit 1
          fi
          if [ ! -f /deploy/.env ]; then
            echo "::error::/deploy/.env not found inside the runner container."
            echo "Contents of /deploy:"
            ls -la /deploy || true
            echo ""
            echo "Fix: place .env in the repo root (same folder as docker-compose.prod.yml), NOT in a subdirectory."
            echo "Then restart the runner with DEPLOY_DIR pointing at that repo root, e.g.:"
            echo "  DEPLOY_DIR=/home/zkcnt/Desktop/zkcnt-pos docker compose -f docker-compose.runner.yml up -d --force-recreate"
            exit 1
          fi
          if [ ! -f /deploy/docker-compose.prod.yml ]; then
            echo "::error::/deploy/docker-compose.prod.yml not found — DEPLOY_DIR must be the git repo root."
            ls -la /deploy || true
            exit 1
          fi

      - name: Pull latest code
        run: |
          cd /deploy
          git fetch origin main
          git reset --hard origin/main

      - name: Deploy production stack
        run: |
          cd /deploy
          docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost/ > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for app... ($i/30)"
            sleep 5
          done
          echo "::error::Health check failed — app did not respond on http://localhost/"
          docker compose -f /deploy/docker-compose.prod.yml ps
          exit 1

      - name: Prune old images
        if: success()
        run: docker image prune -f
