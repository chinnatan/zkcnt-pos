name: Deploy to Pi 5

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pi5
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: [self-hosted, pi5]

    steps:
      - name: Verify deploy directory
        run: |
          if [ ! -d /deploy ]; then
            echo "::error::Deploy directory /deploy not found. Mount ~/Desktop/zkcnt-pos:/deploy in docker-compose.runner.yml"
            exit 1
          fi
          if [ ! -f /deploy/.env ]; then
            echo "::error::/deploy/.env not found. Create .env on the Pi host before deploying."
            exit 1
          fi

      - name: Pull latest code
        run: |
          cd /deploy
          git fetch origin main
          git reset --hard origin/main

      - name: Deploy production stack
        run: |
          cd /deploy
          docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost/ > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for app... ($i/30)"
            sleep 5
          done
          echo "::error::Health check failed — app did not respond on http://localhost/"
          docker compose -f /deploy/docker-compose.prod.yml ps
          exit 1

      - name: Prune old images
        if: success()
        run: docker image prune -f
