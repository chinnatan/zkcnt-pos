name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Backend tests
        run: |
          cd backend
          bun install
          bun test
      - name: Frontend tests
        run: |
          cd frontend
          bun install
          bun run test
      - name: Frontend production build
        run: |
          cd frontend
          bun run build

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - name: Install backend dependencies
        run: cd backend && bun install

      - name: Apply D1 migrations
        run: cd backend && bunx wrangler d1 migrations apply zkcnt-pos --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Workers API
        run: cd backend && bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build frontend
        run: cd frontend && bun install && bun run build
        env:
          NUXT_PUBLIC_API_URL: ""
          NUXT_PUBLIC_APP_URL: ${{ vars.NUXT_PUBLIC_APP_URL }}
          NUXT_PUBLIC_UPLOADS_URL: ""

      - name: Deploy Cloudflare Pages
        run: cd frontend && bunx wrangler pages deploy .output/public --project-name=zkcnt-pos
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
