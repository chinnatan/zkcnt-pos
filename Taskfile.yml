version: "3"

vars:
  DEV_COMPOSE: docker compose -f docker-compose.dev.yml
  PROD_COMPOSE: docker compose -f docker-compose.prod.yml
  API_URL: http://localhost:4001
  APP_URL: http://localhost:4000

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  env:
    desc: Copy .env.example to .env if missing
    cmds:
      - |
        if [ ! -f .env ]; then
          cp .env.example .env
          echo "Created .env from .env.example"
        else
          echo ".env already exists"
        fi

  install:
    desc: Install frontend dependencies with Bun
    dir: frontend
    cmds:
      - bun install

  build:
    desc: Build frontend for production
    dir: frontend
    deps: [install]
    cmds:
      - bun run build

  backend:install:
    desc: Install backend dependencies with Bun
    dir: backend
    cmds:
      - bun install

  backend:migrate:
    desc: Run backend database migrations
    dir: backend
    cmds:
      - bun run migrate

  # ─── Local (Hybrid: Backend Docker + Bun on host) ───

  local:
    desc: Run hybrid local dev (Backend in Docker, frontend with Bun)
    deps: [install, local:backend]
    dir: frontend
    env:
      NUXT_PUBLIC_API_URL: "{{.API_URL}}"
      NUXT_PUBLIC_APP_URL: "{{.APP_URL}}"
      NUXT_PUBLIC_LOG_LEVEL: debug
    cmds:
      - bun run dev
    interactive: true

  local:backend:
    desc: Start backend container for local dev
    cmds:
      - "{{.DEV_COMPOSE}} up backend -d --build"

  local:frontend:
    desc: Run frontend dev server only (requires backend running)
    deps: [install]
    dir: frontend
    env:
      NUXT_PUBLIC_API_URL: "{{.API_URL}}"
      NUXT_PUBLIC_APP_URL: "{{.APP_URL}}"
      NUXT_PUBLIC_LOG_LEVEL: debug
    cmds:
      - bun run dev
    interactive: true

  local:stop:
    desc: Stop backend container used by local dev
    cmds:
      - "{{.DEV_COMPOSE}} stop backend"

  # ─── Dev (Full Docker stack) ───

  dev:
    desc: Run full dev stack in Docker
    cmds:
      - "{{.DEV_COMPOSE}} up --build"
    interactive: true

  dev:down:
    desc: Stop and remove dev stack containers
    cmds:
      - "{{.DEV_COMPOSE}} down"

  dev:logs:
    desc: Follow dev stack logs
    cmds:
      - "{{.DEV_COMPOSE}} logs -f"
    interactive: true

  db-admin:
    desc: Start SQLite admin UI (adminer-node) at http://localhost:8080
    cmds:
      - "{{.DEV_COMPOSE}} --profile admin up db-admin -d"

  db-admin:stop:
    desc: Stop SQLite admin UI container
    cmds:
      - "{{.DEV_COMPOSE}} --profile admin stop db-admin"

  # ─── Prod ───

  prod:
    desc: Run production stack in Docker (detached)
    cmds:
      - "{{.PROD_COMPOSE}} down --remove-orphans"
      - "{{.PROD_COMPOSE}} up -d --build"

  prod:down:
    desc: Stop and remove production stack containers
    cmds:
      - "{{.PROD_COMPOSE}} down"

  prod:logs:
    desc: Follow production stack logs
    cmds:
      - "{{.PROD_COMPOSE}} logs -f"
    interactive: true

  # ─── Tests ───

  test:
    desc: Run all tests (backend + frontend)
    cmds:
      - task: test:backend
      - task: test:frontend

  test:backend:
    desc: Run backend unit and integration tests
    dir: backend
    cmds:
      - bun test

  test:frontend:
    desc: Run frontend Vitest suite
    dir: frontend
    cmds:
      - bun run test

  test:e2e:
    desc: Run Playwright E2E tests (requires frontend build first)
    dir: frontend
    cmds:
      - bun run build
      - bun run test:e2e

  # ─── Backup ───

  backup:
    desc: Create online backup archive (pos.db + uploads + .env)
    cmds:
      - bash scripts/backup.sh

  backup:upload:
    desc: Backup then upload to Google Drive via rclone
    cmds:
      - bash scripts/backup.sh
      - rclone copy backups/ ${RCLONE_REMOTE:-gdrive:zkcnt_com/zkcnt-pos}/ --include "zkcnt-*.tar.gz" --max-age 1h

  restore:
    desc: "Restore from backup archive (usage: task restore -- backups/zkcnt-....tar.gz)"
    cmds:
      - bash scripts/restore.sh {{.CLI_ARGS}}

  # ─── Cloudflare (production) ───

  cf:dev:
    desc: Run Workers API locally with D1/R2 emulation (wrangler dev)
    dir: backend
    deps: [backend:install]
    cmds:
      - bun run cf:dev

  cf:deploy:
    desc: Deploy Workers API to Cloudflare
    dir: backend
    deps: [backend:install]
    cmds:
      - bun run cf:deploy

  cf:db:migrate:
    desc: Apply D1 migrations to remote database
    dir: backend
    deps: [backend:install]
    cmds:
      - bun run cf:db:migrate

  cf:db:migrate:local:
    desc: Apply D1 migrations to local D1 database
    dir: backend
    deps: [backend:install]
    cmds:
      - bun run cf:db:migrate:local

  cf:export-d1:
    desc: Export pos.db to SQL for D1 import
    dir: backend
    deps: [backend:install]
    cmds:
      - bun run migrate:d1

  cf:sync-uploads:
    desc: Sync local uploads directory to R2 bucket
    dir: backend
    deps: [backend:install]
    cmds:
      - bun run scripts/sync-uploads-to-r2.ts

  pages:deploy:
    desc: Build and deploy frontend to Cloudflare Pages
    deps: [build]
    dir: frontend
    cmds:
      - bunx wrangler pages deploy .output/public --project-name=zkcnt-pos

  deploy:cloudflare:
    desc: Deploy API + Pages + D1 migrations to Cloudflare
    cmds:
      - task: cf:db:migrate
      - task: cf:deploy
      - task: pages:deploy
