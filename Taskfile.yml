version: "3"

vars:
  DEV_COMPOSE: docker compose -f docker-compose.dev.yml
  PROD_COMPOSE: docker compose -f docker-compose.prod.yml
  PB_URL: http://localhost:8090

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  env:
    desc: Copy .env.example to .env if missing
    cmds:
      - |
        if [ ! -f .env ]; then
          cp .env.example .env
          echo "Created .env from .env.example"
        else
          echo ".env already exists"
        fi

  install:
    desc: Install frontend dependencies with Bun
    dir: frontend
    cmds:
      - bun install

  build:
    desc: Build frontend for production
    dir: frontend
    deps: [install]
    cmds:
      - bun run build

  # ─── Local (Hybrid: PocketBase Docker + Bun on host) ───

  local:
    desc: Run hybrid local dev (PocketBase in Docker, frontend with Bun)
    deps: [install, local:backend]
    dir: frontend
    env:
      NUXT_PUBLIC_POCKETBASE_URL: "{{.PB_URL}}"
    cmds:
      - bun run dev
    interactive: true

  local:backend:
    desc: Start PocketBase container for local dev
    cmds:
      - "{{.DEV_COMPOSE}} up pocketbase -d"

  local:frontend:
    desc: Run frontend dev server only (requires PocketBase running)
    deps: [install]
    dir: frontend
    env:
      NUXT_PUBLIC_POCKETBASE_URL: "{{.PB_URL}}"
    cmds:
      - bun run dev
    interactive: true

  local:stop:
    desc: Stop PocketBase container used by local dev
    cmds:
      - "{{.DEV_COMPOSE}} stop pocketbase"

  # ─── Dev (Full Docker stack) ───

  dev:
    desc: Run full dev stack in Docker
    cmds:
      - "{{.DEV_COMPOSE}} up --build"
    interactive: true

  dev:down:
    desc: Stop and remove dev stack containers
    cmds:
      - "{{.DEV_COMPOSE}} down"

  dev:logs:
    desc: Follow dev stack logs
    cmds:
      - "{{.DEV_COMPOSE}} logs -f"
    interactive: true

  # ─── Prod ───

  prod:
    desc: Run production stack in Docker (detached)
    cmds:
      - "{{.PROD_COMPOSE}} down --remove-orphans"
      - "{{.PROD_COMPOSE}} up -d --build"

  prod:down:
    desc: Stop and remove production stack containers
    cmds:
      - "{{.PROD_COMPOSE}} down"

  prod:logs:
    desc: Follow production stack logs
    cmds:
      - "{{.PROD_COMPOSE}} logs -f"
    interactive: true
