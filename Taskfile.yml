version: "3"

vars:
  DEV_COMPOSE: docker compose -f docker-compose.dev.yml
  PROD_COMPOSE: docker compose -f docker-compose.prod.yml
  API_URL: http://localhost:4001
  APP_URL: http://localhost:4000

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  env:
    desc: Copy .env.example to .env if missing
    cmds:
      - |
        if [ ! -f .env ]; then
          cp .env.example .env
          echo "Created .env from .env.example"
        else
          echo ".env already exists"
        fi

  install:
    desc: Install frontend dependencies with Bun
    dir: frontend
    cmds:
      - bun install

  build:
    desc: Build frontend for production
    dir: frontend
    deps: [install]
    cmds:
      - bun run build

  backend:install:
    desc: Install backend dependencies with Bun
    dir: backend
    cmds:
      - bun install

  backend:migrate:
    desc: Run backend database migrations
    dir: backend
    cmds:
      - bun run migrate

  # ─── Local (Hybrid: Backend Docker + Bun on host) ───

  local:
    desc: Run hybrid local dev (Backend in Docker, frontend with Bun)
    deps: [install, local:backend]
    dir: frontend
    env:
      NUXT_PUBLIC_API_URL: "{{.API_URL}}"
      NUXT_PUBLIC_APP_URL: "{{.APP_URL}}"
      NUXT_PUBLIC_LOG_LEVEL: debug
    cmds:
      - bun run dev
    interactive: true

  local:backend:
    desc: Start backend container for local dev
    cmds:
      - "{{.DEV_COMPOSE}} up backend -d --build"

  local:frontend:
    desc: Run frontend dev server only (requires backend running)
    deps: [install]
    dir: frontend
    env:
      NUXT_PUBLIC_API_URL: "{{.API_URL}}"
      NUXT_PUBLIC_APP_URL: "{{.APP_URL}}"
      NUXT_PUBLIC_LOG_LEVEL: debug
    cmds:
      - bun run dev
    interactive: true

  local:stop:
    desc: Stop backend container used by local dev
    cmds:
      - "{{.DEV_COMPOSE}} stop backend"

  # ─── Dev (Full Docker stack) ───

  dev:
    desc: Run full dev stack in Docker
    cmds:
      - "{{.DEV_COMPOSE}} up --build"
    interactive: true

  dev:down:
    desc: Stop and remove dev stack containers
    cmds:
      - "{{.DEV_COMPOSE}} down"

  dev:logs:
    desc: Follow dev stack logs
    cmds:
      - "{{.DEV_COMPOSE}} logs -f"
    interactive: true

  db-admin:
    desc: Start SQLite admin UI (adminer-node) at http://localhost:8080
    cmds:
      - "{{.DEV_COMPOSE}} --profile admin up db-admin -d"

  db-admin:stop:
    desc: Stop SQLite admin UI container
    cmds:
      - "{{.DEV_COMPOSE}} --profile admin stop db-admin"

  # ─── Prod ───

  prod:
    desc: Run production stack in Docker (detached)
    cmds:
      - "{{.PROD_COMPOSE}} down --remove-orphans"
      - "{{.PROD_COMPOSE}} up -d --build"

  prod:down:
    desc: Stop and remove production stack containers
    cmds:
      - "{{.PROD_COMPOSE}} down"

  prod:logs:
    desc: Follow production stack logs
    cmds:
      - "{{.PROD_COMPOSE}} logs -f"
    interactive: true

  # ─── Backup ───

  backup:
    desc: Create online backup archive (pos.db + uploads + .env)
    cmds:
      - bash scripts/backup.sh

  backup:upload:
    desc: Backup then upload to Google Drive via rclone
    cmds:
      - bash scripts/backup.sh
      - rclone copy backups/ ${RCLONE_REMOTE:-gdrive:zkcnt_com/zkcnt-pos}/ --include "zkcnt-*.tar.gz" --max-age 1h

  restore:
    desc: "Restore from backup archive (usage: task restore -- backups/zkcnt-....tar.gz)"
    cmds:
      - bash scripts/restore.sh {{.CLI_ARGS}}
