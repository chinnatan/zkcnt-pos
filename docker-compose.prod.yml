services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    volumes:
      - ./backend/data:/data
    environment:
      - DATA_DIR=/data
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - APP_URL=${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
    networks:
      - pos-network

  frontend:
    build:
      context: ./frontend
      args:
        NUXT_PUBLIC_API_URL: ${NUXT_PUBLIC_API_URL:-}
        NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NUXT_PUBLIC_API_URL=${NUXT_PUBLIC_API_URL:-}
      - NUXT_PUBLIC_APP_URL=${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      - backend
    networks:
      - pos-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/data/uploads:/data/uploads:ro
    depends_on:
      - frontend
      - backend
    networks:
      - pos-network

networks:
  pos-network:
    driver: bridge
