services:
  pocketbase:
    build:
      context: ./backend
      args:
        PB_VERSION: "0.38.1"
    restart: unless-stopped
    volumes:
      - pb_data:/pb/pb_data
    networks:
      - pos-network

  frontend:
    build:
      context: ./frontend
      args:
        NUXT_PUBLIC_POCKETBASE_URL: ${POCKETBASE_URL:-http://localhost:8090}
    restart: unless-stopped
    environment:
      - NUXT_PUBLIC_POCKETBASE_URL=${POCKETBASE_URL:-http://pocketbase:8090}
    depends_on:
      - pocketbase
    networks:
      - pos-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - pocketbase
    networks:
      - pos-network

volumes:
  pb_data:

networks:
  pos-network:
    driver: bridge
