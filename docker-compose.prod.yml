services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    volumes:
      - ./backend/data:/data
    environment:
      - DATA_DIR=/data
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - APP_URL=${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM=${RESEND_FROM:-}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    networks:
      - pos-network

  frontend:
    build:
      context: ./frontend
      args:
        NUXT_PUBLIC_API_URL: ${NUXT_PUBLIC_API_URL:-}
        NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
        NUXT_PUBLIC_LOG_LEVEL: ${NUXT_PUBLIC_LOG_LEVEL:-warn}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NUXT_PUBLIC_API_URL=${NUXT_PUBLIC_API_URL:-}
      - NUXT_PUBLIC_APP_URL=${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NUXT_PUBLIC_LOG_LEVEL=${NUXT_PUBLIC_LOG_LEVEL:-warn}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    depends_on:
      - backend
    networks:
      - pos-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/data/uploads:/data/uploads:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    depends_on:
      - frontend
      - backend
    networks:
      - pos-network

networks:
  pos-network:
    driver: bridge
