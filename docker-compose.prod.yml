services:
  pocketbase:
    build:
      context: ./backend
      args:
        PB_VERSION: "0.38.1"
    restart: unless-stopped
    volumes:
      - ./backend/pb_data:/pb/pb_data
      - ./backend/pb_migrations:/pb/pb_migrations
      - ./backend/pb_hooks:/pb/pb_hooks
    environment:
      - APP_URL=${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
    networks:
      - pos-network

  frontend:
    build:
      context: ./frontend
      args:
        NUXT_PUBLIC_POCKETBASE_URL: ${NUXT_PUBLIC_POCKETBASE_URL:-${POCKETBASE_URL:-http://localhost:8090}}
        NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NUXT_PUBLIC_POCKETBASE_URL=${NUXT_PUBLIC_POCKETBASE_URL:-${POCKETBASE_URL:-http://localhost:8090}}
      - NUXT_PUBLIC_APP_URL=${NUXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      - pocketbase
    networks:
      - pos-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - pocketbase
    networks:
      - pos-network

volumes:
  pb_data:

networks:
  pos-network:
    driver: bridge
